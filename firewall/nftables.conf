#!/usr/sbin/nft -f

flush ruleset

table inet filter {

    chain input {
        type filter hook input priority filter; policy drop;

        # Allow loopback
        iif "lo" accept

        # Allow established and related connections
        ct state established,related accept

        # Drop invalid packets
        ct state invalid drop

        # Allow ICMP for diagnostics
        ip protocol icmp accept
        ip6 nexthdr icmpv6 accept

        # Allow all traffic arriving through the WireGuard tunnel
        iif "wg-US-FREE-96" accept

        # Silently drop multicast/broadcast noise (mDNS, SSDP, DHCP)
        # These are normal LAN chatter — don't log, don't alert
        ip daddr 224.0.0.0/4 drop
        ip daddr 255.255.255.255 drop
        ip6 daddr ff00::/8 drop

        # Log and drop everything else — THESE are the real threats
        log prefix "nft-in-drop: " drop
    }

    chain forward {
        type filter hook forward priority filter; policy drop;
    }

    chain output {
        type filter hook output priority filter; policy drop;

        # Loopback
        oif "lo" accept

        # Everything through the VPN tunnel
        oif "wg-US-FREE-96" accept

        # WireGuard handshake packets (marked with fwmark 0xca6c = 51820)
        meta mark 0xca6c accept

        # DHCP (needed to get/renew IP on any WiFi)
        udp sport 68 udp dport 67 accept

        # Local LAN — any private network (captive portals, gateway reach)
        # These ranges can't route to the internet, so no leak risk
        ip daddr 10.0.0.0/8 accept
        ip daddr 172.16.0.0/12 accept
        ip daddr 192.168.0.0/16 accept

        # IPv6 link-local (SLAAC, neighbor discovery)
        ip6 daddr fe80::/10 accept

        # Log and drop everything else — THIS IS THE KILL-SWITCH
        log prefix "nft-out-drop: " drop
    }

}
