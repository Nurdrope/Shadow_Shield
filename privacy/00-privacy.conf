# Shadow_Shield — NetworkManager Privacy Config
# Apply: sudo cp 00-privacy.conf /etc/NetworkManager/conf.d/ && sudo systemctl restart NetworkManager
#
# What this does:
# - Randomizes MAC during WiFi scanning (passive anonymity)
# - Uses a stable fake MAC per SSID (no captive portal friction)
# - Blocks hostname from being sent via DHCP

[device-mac-randomization]
wifi.scan-rand-mac-address=yes

[connection-mac-randomization]
wifi.cloned-mac-address=stable
ethernet.cloned-mac-address=stable

[connection]
ipv4.dhcp-send-hostname=false
ipv6.dhcp-send-hostname=false
