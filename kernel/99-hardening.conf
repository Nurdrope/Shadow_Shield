# Shadow_Shield — Kernel Hardening (sysctl)
# Apply: sudo cp 99-hardening.conf /etc/sysctl.d/ && sudo sysctl --system

# Disable TTY line discipline autoload (CVE vector)
dev.tty.ldisc_autoload=0

# Protect FIFOs in world-writable directories
fs.protected_fifos=2

# Restrict kernel log access
kernel.dmesg_restrict=1

# Hide kernel pointers from non-root
kernel.kptr_restrict=2

# Disable magic SysRq key
kernel.sysrq=0

# Disable unprivileged BPF
kernel.unprivileged_bpf_disabled=1

# Restrict ptrace to parent processes only
kernel.yama.ptrace_scope=1

# Harden BPF JIT compiler
net.core.bpf_jit_harden=2

# Disable ICMP redirects (MITM prevention)
net.ipv4.conf.all.accept_redirects=0
net.ipv4.conf.default.accept_redirects=0
net.ipv6.conf.all.accept_redirects=0
net.ipv6.conf.default.accept_redirects=0

# Log martian packets (impossible source addresses)
net.ipv4.conf.all.log_martians=1
net.ipv4.conf.default.log_martians=1

# Enable reverse path filtering (spoofing protection)
net.ipv4.conf.all.rp_filter=1

# IPv6 privacy extensions (random temporary addresses)
net.ipv6.conf.all.use_tempaddr=2
net.ipv6.conf.default.use_tempaddr=2
